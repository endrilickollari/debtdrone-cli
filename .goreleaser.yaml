version: 2
project_name: debtdrone

builds:
  - id: debtdrone-cli
    dir: .
    main: ./cmd/debtdrone
    binary: debtdrone
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "README"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: endrilickollari
    name: debtdrone-cli
  draft: false
  prerelease: auto
  mode: replace

brews:
  - name: debtdrone
    repository:
      owner: endrilickollari
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    url_template: "https://github.com/endrilickollari/debtdrone-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    directory: Formula
    homepage: "https://github.com/endrilickollari/debtdrone"
    description: "Technical debt analysis tool for modern codebases."
    license: "MIT"
    test: |
      system "#{bin}/debtdrone --version"
